<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNSUBSCRIBE // Global Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --accent: #ff4b4b;
            --vault-accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.02);
            --border: rgba(255, 255, 255, 0.08);
        }

        * { cursor: crosshair; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .mesh-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: -1; 
            background: #000; 
        }

        .glow-sphere {
            position: absolute; 
            width: 600px; 
            height: 600px; 
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 75, 75, 0.3) 0%, transparent 70%);
            filter: blur(100px); 
            animation: drift 20s infinite alternate;
        }

        @keyframes drift { 
            from { transform: translate(-10%, -10%); } 
            to { transform: translate(30%, 20%); } 
        }

        header { padding: 80px 20px 20px; text-align: center; }

        h1 { 
            font-size: 70px; 
            font-weight: 700; 
            margin: 0; 
            letter-spacing: -5px; 
            background: linear-gradient(#fff, #666); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .subtitle { 
            font-family: 'JetBrains Mono'; 
            color: var(--accent); 
            letter-spacing: 4px; 
            font-size: 11px; 
            text-transform: uppercase; 
        }

        .search-wrapper { 
            width: 90%; 
            max-width: 700px; 
            position: sticky; 
            top: 20px; 
            z-index: 1000; 
            margin-top: 20px; 
        }

        .search-input {
            width: 100%; 
            background: rgba(15, 15, 15, 0.85);
            border: 1px solid var(--border); 
            padding: 22px 30px; 
            border-radius: 20px;
            color: white; 
            font-size: 18px; 
            outline: none;
        }

        .tiles-container {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px; 
            width: 90%; 
            max-width: 1100px; 
            margin: 40px 0;
        }

        .tile {
            background: var(--glass); 
            border: 1px solid var(--border); 
            aspect-ratio: 1/1;
            border-radius: 24px; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            cursor: pointer; 
            transition: 0.3s;
        }

        .tile:hover { 
            transform: translateY(-8px); 
            border-color: var(--accent); 
        }

        .tile img { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            background: #fff; 
            padding: 2px; 
        }

        #results { 
            width: 90%; 
            max-width: 800px; 
            margin-top: 40px; 
            display: grid; 
            gap: 15px; 
            padding-bottom: 100px; 
        }

        .service-card {
            background: var(--glass); 
            border: 1px solid var(--border); 
            padding: 25px 35px;
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .action-btns { display: flex; gap: 12px; }

        .btn { 
            padding: 10px 18px; 
            border-radius: 10px; 
            font-weight: 700; 
            font-size: 12px; 
            cursor: pointer; 
            text-decoration: none; 
        }

        .btn-plans { 
            background: rgba(255,255,255,0.05); 
            color: #fff; 
            border: 1px solid var(--border); 
        }

        .btn-abort { 
            background: var(--accent); 
            color: #fff; 
            border: none; 
        }

        .modal-overlay {
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000; 
            display: none; 
            align-items: center; 
            justify-content: center;
        }

        .modal-content {
            background: #0a0a0a; 
            border: 1px solid var(--border);
            width: 95%; 
            max-width: 500px; 
            border-radius: 30px; 
            padding: 40px;
            position: relative;
        }

        .close-modal { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: none; 
            border: none; 
            color: #666; 
            font-size: 24px; 
            cursor: pointer; 
        }

        .plan-item {
            background: var(--glass); 
            border: 1px solid var(--border);
            padding: 15px; 
            border-radius: 15px; 
            margin-top: 10px;
            display: flex; 
            justify-content: space-between; 
        }
    </style>
</head>
<body>

<div class="mesh-container"><div class="glow-sphere"></div></div>

<header>
    <div class="subtitle">Global SaaS Intelligence // Srivastava-Anant</div>
    <h1>UNSUBSCRIBE</h1>
</header>

<div class="search-wrapper">
    <input type="text" id="mainSearch" class="search-input"
           placeholder="Initiate Search Sequence..."
           onkeyup="filterServices()">
</div>

<div class="tiles-container" id="tilesGrid"></div>
<main id="results"></main>

<div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal" onclick="closeModal()">×</button>
        <div id="modalLogo" style="margin-bottom: 20px;"></div>
        <h2 id="modalName"></h2>
        <div id="planList" style="margin-top: 30px;"></div>
    </div>
</div>

<script>

function getLogo(domain) {
    return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
}

async function init() {
    const res = await fetch("http://localhost:5000/api/services/featured");
    const featured = await res.json();

    const grid = document.getElementById('tilesGrid');

    grid.innerHTML = featured.map(s => `
        <div class="tile" onclick="selectService('${s.name}')">
            <img src="${getLogo(s.domain)}">
            <span>${s.name}</span>
        </div>
    `).join('');
}

async function filterServices() {
    const query = document.getElementById('mainSearch').value;
    const results = document.getElementById('results');
    const tiles = document.getElementById('tilesGrid');

    tiles.style.display = query.length > 0 ? 'none' : 'grid';
    results.innerHTML = "";

    if (query.length < 2) return;

    const res = await fetch(`http://localhost:5000/api/services/search?q=${query}`);
    const matches = await res.json();

    results.innerHTML = matches.map(s => `
        <div class="service-card">
            <div style="display:flex; align-items:center; gap:20px;">
                <img src="${getLogo(s.domain)}" style="width:40px; border-radius:10px;">
                <span style="font-weight:700; font-size:22px;">${s.name}</span>
            </div>
            <div class="action-btns">
                <button class="btn btn-plans" onclick="showPlans('${s.name}')">
                    VIEW PLANS
                </button>
                <a href="${s.link}" target="_blank" class="btn btn-abort">
                    TERMINATE ❯
                </a>
            </div>
        </div>
    `).join('');
}

async function showPlans(name) {
    const res = await fetch(`http://localhost:5000/api/services/${name}`);
    const service = await res.json();

    document.getElementById('modalName').innerText = service.name;
    document.getElementById('modalLogo').innerHTML =
        `<img src="${getLogo(service.domain)}" style="width:60px; border-radius:12px; background:white; padding:4px;">`;

    const list = document.getElementById('planList');

    list.innerHTML = service.plans.map(p => {
        const parts = p.split(':');
        return `<div class="plan-item">
            <span>${parts[0]}</span>
            <b style="color:var(--vault-accent)">${parts[1] || ''}</b>
        </div>`;
    }).join('');

    document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
}

function selectService(name) {
    document.getElementById('mainSearch').value = name;
    filterServices();
}

init();

</script>

</body>
</html>
