apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: unsubscribe-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: unsubscribe-backend
        imagePullPolicy: Never

        ports:
        - containerPort: 5000

        env:
        - name: MONGO_URI
          value: mongodb://mongo:27017/unsubscribe
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: unsubscribe-project

spec:
  selector:
    app: backend

  ports:
  - protocol: TCP
    port: 5000
    targetPort: 5000

  type: ClusterIP
