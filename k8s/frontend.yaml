apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unsubscribe-project

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend
        image: srivastavaanant/unsubscribe-frontend:latest

        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: unsubscribe-project

spec:
  type: NodePort

  selector:
    app: frontend

  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
    nodePort: 30007
